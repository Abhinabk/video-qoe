services:
  kafka:
    image: confluentinc/cp-kafka:8.2.2
    hostname: kafka #what the continer calls itself 
    container_name: kafka #actual continer name waht sows up in docker ps
    ports:
      - "9092:9092"
    volumes:
      - kafka-qoe-data:/var/lib/kafka/data
    environment:
      # --- KRaft --- 
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller 
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093 #1=Node-ID sp 1 is reachble at kafka:29093 for vote
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk   # any fixed 22-char base64 id

      # --- LISTNERS --- 
      KAFKA_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://kafka:29093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER 

      # --- Single Broker Defaults
      
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
volumes:
  kafka-qoe-data: